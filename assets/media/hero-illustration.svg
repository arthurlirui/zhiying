<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea" />
      <stop offset="100%" style="stop-color:#764ba2" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="200" cy="150" r="120" fill="url(#bgGrad)" />
  
  <!-- 书本/文档图标 -->
  <g transform="translate(140, 80)">
    <rect x="0" y="20" width="120" height="100" rx="8" fill="white" stroke="#667eea" stroke-width="2"/>
    <line x1="20" y1="45" x2="100" y2="45" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="60" x2="80" y2="60" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="75" x2="90" y2="75" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="90" x2="60" y2="90" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- AI大脑图标 -->
  <g transform="translate(260, 60)">
    <circle cx="40" cy="40" r="35" fill="url(#btnGrad)" opacity="0.9"/>
    <text x="40" y="48" font-family="Arial" font-size="32" fill="white" text-anchor="middle" font-weight="bold">AI</text>
  </g>
  
  <!-- 箭头连接 -->
  <path d="M220 130 Q 245 110 265 95" stroke="#667eea" stroke-width="2" fill="none" stroke-dasharray="4,4">
    <animate attributeName="stroke-dashoffset" from="0" to="8" dur="1s" repeatCount="indefinite"/>
  </path>
  
  <!-- 语音波纹 -->
  <g transform="translate(180, 190)">
    <rect x="0" y="30" width="8" height="30" rx="4" fill="#667eea" opacity="0.3">
      <animate attributeName="height" values="30;50;30" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="y" values="30;20;30" dur="0.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="15" y="20" width="8" height="50" rx="4" fill="#764ba2" opacity="0.5">
      <animate attributeName="height" values="50;30;50" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="y" values="20;30;20" dur="1s" repeatCount="indefinite"/>
    </rect>
    <rect x="30" y="25" width="8" height="40" rx="4" fill="#667eea" opacity="0.4">
      <animate attributeName="height" values="40;60;40" dur="0.9s" repeatCount="indefinite"/>
      <animate attributeName="y" values="25;15;25" dur="0.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="45" y="28" width="8" height="34" rx="4" fill="#764ba2" opacity="0.3">
      <animate attributeName="height" values="34;54;34" dur="1.1s" repeatCount="indefinite"/>
      <animate attributeName="y" values="28;18;28" dur="1.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="60" y="22" width="8" height="46" rx="4" fill="#667eea" opacity="0.5">
      <animate attributeName="height" values="46;26;46" dur="0.85s" repeatCount="indefinite"/>
      <animate attributeName="y" values="22;32;22" dur="0.85s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- 眼睛图标 -->
  <g transform="translate(100, 200)">
    <ellipse cx="25" cy="15" rx="25" ry="15" fill="none" stroke="#667eea" stroke-width="2"/>
    <circle cx="25" cy="15" r="8" fill="#764ba2"/>
    <circle cx="27" cy="13" r="2" fill="white"/>
  </g>
  
  <!-- 播放按钮 -->
  <g transform="translate(285, 195)">
    <circle cx="25" cy="25" r="25" fill="url(#btnGrad)"/>
    <polygon points="20,15 20,35 38,25" fill="white"/>
  </g>
</svg>
