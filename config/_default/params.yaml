# ══════════════════════════════════════════════════════════════════════════════
# 知影 · AI读帖官 - Hugo Blox 配置
# ══════════════════════════════════════════════════════════════════════════════
hugoblox:
  schema: "2.0"

  # ────────────────────────────────────────────────────────────────────────────
  # 身份标识
  # ────────────────────────────────────────────────────────────────────────────
  identity:
    name: "知影"
    organization: "知影工作室"
    type: product
    tagline: "AI读帖官 · 看图说话"
    description: "知乎数字人 · 智能内容压缩与语音化引擎，把长图文转化为通勤场景的轻量级内容"
    social:
      twitter: ""

  # ────────────────────────────────────────────────────────────────────────────
  # 主题配置 - 现代极简风格
  # ────────────────────────────────────────────────────────────────────────────
  theme:
    mode: system
    pack: "default"
    colors:
      primary: "indigo"
      secondary: "slate"
      neutral: "neutral"

  # ────────────────────────────────────────────────────────────────────────────
  # 排版
  # ────────────────────────────────────────────────────────────────────────────
  typography:
    pack: "modern"

  # ────────────────────────────────────────────────────────────────────────────
  # 布局
  # ────────────────────────────────────────────────────────────────────────────
  layout:
    radius: "md"
    spacing: "comfortable"

  # ────────────────────────────────────────────────────────────────────────────
  # 页头导航
  # ────────────────────────────────────────────────────────────────────────────
  header:
    enable: true
    style: navbar-simple
    sticky: true
    align: center
    search: false
    theme_toggle: true
    theme_picker: true
    language_switcher: false

  # ────────────────────────────────────────────────────────────────────────────
  # 页脚
  # ────────────────────────────────────────────────────────────────────────────
  footer:
    style: minimal
    language_switcher: false
    text: "© 2025 知影 · AI读帖官 | 让信息像短视频一样被高效消费"

  # ────────────────────────────────────────────────────────────────────────────
  # 版权信息
  # ────────────────────────────────────────────────────────────────────────────
  copyright:
    notice: "© {year} 知影工作室"
    license:
      type: cc
      allow_derivatives: true
      share_alike: true
      allow_commercial: true

  # ────────────────────────────────────────────────────────────────────────────
  # 内容设置
  # ────────────────────────────────────────────────────────────────────────────
  content:
    math:
      enable: false
    toc:
      enable: false
    reading_time:
      enable: false

  # ────────────────────────────────────────────────────────────────────────────
  # 搜索
  # ────────────────────────────────────────────────────────────────────────────
  search:
    enable: false
    suggestions: []

  # ────────────────────────────────────────────────────────────────────────────
  # 评论
  # ────────────────────────────────────────────────────────────────────────────
  comments:
    enable: false

  # ────────────────────────────────────────────────────────────────────────────
  # 分析统计
  # ────────────────────────────────────────────────────────────────────────────
  analytics:
    google:
      measurement_id: ""
    plausible:
      domain: ""

  # ────────────────────────────────────────────────────────────────────────────
  # 本地化
  # ────────────────────────────────────────────────────────────────────────────
  locale:
    date_format: "2006年1月2日"
    time_format: "15:04"

  # ────────────────────────────────────────────────────────────────────────────
  # 安全设置
  # ────────────────────────────────────────────────────────────────────────────
  security:
    frame_options: allow

  # ────────────────────────────────────────────────────────────────────────────
  # 专业版
  # ────────────────────────────────────────────────────────────────────────────
  pro:
    hide_attribution: false
    affiliate_code: ""
