[build]
  command = """
    set -e
    echo "=== Starting Markdown Slides build process ==="
    echo "Node version: $(node --version)"
    echo "pnpm version: $(pnpm --version)"
    echo "Hugo version: $(hugo version)"
    
    echo "=== Installing dependencies ==="
    pnpm install --no-frozen-lockfile
    
    echo "=== Running Hugo build ==="
    hugo --gc --minify -b $URL
    
    echo "=== Running Pagefind indexing ==="
    pnpm run pagefind
    
    echo "=== Build completed successfully ==="
  """
  publish = "public"
  # Netlify Functions 目录
  functions = "netlify/functions"

[build.environment]
  HUGO_VERSION = "0.161.1"
  GO_VERSION = "1.21.5"
  NODE_VERSION = "22"
  PNPM_FLAGS = "--no-frozen-lockfile"
  HUGO_ENABLEGITINFO = "true"

[context.production.environment]
  HUGO_ENV = "production"

[context.deploy-preview]
  command = """
    set -e
    pnpm install --no-frozen-lockfile
    hugo --gc --minify --buildFuture -b $DEPLOY_PRIME_URL
    pnpm run pagefind
  """

[context.branch-deploy]
  command = """
    set -e
    pnpm install --no-frozen-lockfile
    hugo --gc --minify -b $DEPLOY_PRIME_URL
    pnpm run pagefind
  """

[[plugins]]
  package = "netlify-plugin-hugo-cache-resources"

# ══════════════════════════════════════════════════════════════════════════════
# API 路由 - 将 /api/* 映射到 Netlify Functions
# Netlify Functions 默认路径: /.netlify/functions/<name>
# 以下重写让前端可以简洁地调用 /api/auth/xxx
# ══════════════════════════════════════════════════════════════════════════════

[[redirects]]
  from = "/api/auth/oauth-callback"
  to = "/.netlify/functions/auth-zhihu"
  status = 200

[[redirects]]
  from = "/api/auth/me"
  to = "/.netlify/functions/auth-me"
  status = 200

# ══════════════════════════════════════════════════════════════════════════════
# OAuth 回调路由
# 关键: 知乎回调 /auth/callback/?code=XXX&state=XXX
# 必须保留 query params，Netlify 默认会传递
# ══════════════════════════════════════════════════════════════════════════════

[[redirects]]
  from = "/auth/callback"
  to = "/auth/callback/index.html"
  status = 200
  # query params 自动保留，无需额外配置

[[redirects]]
  from = "/auth/callback/"
  to = "/auth/callback/index.html"
  status = 200

# ══════════════════════════════════════════════════════════════════════════════
# CORS 安全响应头
# ══════════════════════════════════════════════════════════════════════════════

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://zhiying-web.netlify.app"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Allow-Credentials = "true"
    Access-Control-Max-Age = "86400"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://zhiying-web.netlify.app"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Allow-Credentials = "true"

# ══════════════════════════════════════════════════════════════════════════════
# 安全头
# ══════════════════════════════════════════════════════════════════════════════

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
